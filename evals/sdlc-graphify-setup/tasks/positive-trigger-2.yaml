id: graphify-setup-configure-index
name: Configure knowledge graph for repo navigation
description: >
  Trigger sdlc-graphify-setup via a natural-language prompt about knowledge
  graph navigation. Verifies skill is invoked and bash is called.
tags:
  - positive-trigger
  - archetype-d
  - graphify
inputs:
  prompt: >
    Configure the knowledge graph so the AI agent can navigate this repo.
    Use skill:sdlc-graphify-setup and index all files under src/.
expected:
  should_trigger: true
graders:
  - name: skill-invoked
    type: skill_invocation
    config:
      required_skills:
        - sdlc-graphify-setup
      mode: any_order
      allow_extra: true
  - name: action-sequence
    type: action_sequence
    config:
      matching_mode: in_order_match
      expected_actions:
        - type: skill_invoked
          skill: sdlc-graphify-setup
        - type: tool_called
          tool: bash
  - name: behavior-budget
    type: behavior
    config:
      max_tokens: 200000
      max_duration_ms: 300000
      max_tool_calls: 40
