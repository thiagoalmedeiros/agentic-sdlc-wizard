id: graphify-negative-matplotlib
name: Adversarial negative — bar graph in matplotlib
description: >
  Adversarial negative. A question about plotting bar graphs in matplotlib
  must NOT trigger sdlc-graphify-setup.
tags:
  - negative-trigger
  - adversarial
inputs:
  prompt: "How do I plot a bar graph in matplotlib?"
expected:
  should_trigger: false
graders:
  - name: no-skill-invoked
    type: behavior
    config:
      forbidden_tools:
        - skill
  - name: no-graphify-language
    type: text
    config:
      not_contains:
        - graphify
        - knowledge graph
        - index
