id: graphify-holdout-negative-knowledge-graph-ai
name: Hold-out adversarial negative — knowledge graph theory
description: >
  Hold-out negative. A general question about knowledge graph theory must NOT
  trigger sdlc-graphify-setup.
tags:
  - negative-trigger
  - holdout
  - adversarial
inputs:
  prompt: "Explain the difference between a knowledge graph and a relational database."
expected:
  should_trigger: false
graders:
  - name: no-skill-invoked
    type: behavior
    config:
      forbidden_tools:
        - skill
  - name: no-install-run
    type: behavior
    config:
      forbidden_tools:
        - bash
  - name: no-graphify-language
    type: text
    config:
      not_contains:
        - graphify
        - npm install graphify
        - graph index
