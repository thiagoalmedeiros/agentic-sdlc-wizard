id: lessons-learned-init-file
name: Initialize lessons.md file
description: >
  Trigger sdlc-lessons-learned in init mode. Verifies that the file is created
  with the correct template structure.
tags:
  - positive-trigger
  - archetype-e
  - log-file
inputs:
  prompt: >
    Use skill:sdlc-lessons-learned to initialize a new lessons.md file at
    plans/new-feature/lessons.md. The file should not exist yet.
expected:
  should_trigger: true
graders:
  - name: lessons-file-initialized
    type: file
    config:
      must_exist:
        - plans/new-feature/lessons.md
      content_patterns:
        - path: plans/new-feature/lessons.md
          must_match:
            - "(?m)^# Lessons Learned"
  - name: action-sequence
    type: action_sequence
    config:
      matching_mode: in_order_match
      expected_actions:
        - type: skill_invoked
          skill: sdlc-lessons-learned
        - type: file_created
          path_pattern: "plans/new-feature/lessons\.md"
  - name: behavior-budget
    type: behavior
    config:
      max_tokens: 60000
      max_duration_ms: 180000
      max_tool_calls: 15
