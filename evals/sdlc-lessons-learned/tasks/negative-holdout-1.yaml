id: lessons-holdout-negative-history-lesson
name: Hold-out adversarial negative — history lesson
description: >
  Hold-out negative. A request about lessons from history must NOT trigger
  sdlc-lessons-learned.
tags:
  - negative-trigger
  - holdout
  - adversarial
inputs:
  prompt: "What are the most important lessons humanity has learned from World War II?"
expected:
  should_trigger: false
graders:
  - name: no-skill-invoked
    type: behavior
    config:
      forbidden_tools:
        - skill
  - name: no-lessons-file
    type: file
    config:
      must_not_exist:
        - plans/wwii/lessons.md
  - name: no-lessons-format
    type: text
    config:
      regex_not_match:
        - "\\*\\*Context:\\*\\*"
        - "\\*\\*Mistake:\\*\\*"
