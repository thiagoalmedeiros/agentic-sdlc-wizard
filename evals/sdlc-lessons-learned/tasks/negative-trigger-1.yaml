id: lessons-learned-negative-financial-crisis
name: Adversarial negative — financial crisis lessons
description: >
  Adversarial negative. A question about historical economic lessons must NOT
  trigger sdlc-lessons-learned. Verifies the skill declines non-SDLC requests.
tags:
  - negative-trigger
  - adversarial
inputs:
  prompt: "What lessons did humanity learn from the 2008 financial crisis?"
expected:
  should_trigger: false
graders:
  - name: no-skill-invoked
    type: behavior
    config:
      forbidden_tools:
        - skill
  - name: no-lessons-file
    type: file
    config:
      must_not_exist:
        - plans/financial-crisis/lessons.md
  - name: no-lessons-format
    type: text
    config:
      not_contains:
        - "**Context:**"
        - "**Mistake:**"
        - "**Rule:**"
