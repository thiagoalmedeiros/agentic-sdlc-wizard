id: sdlc-wizard-setup-devcontainer
name: Configure dev container via wizard
description: >
  Trigger sdlc-wizard to set up a devcontainer for this project.
  Checks first-hop skill invocation and that it dispatches sdlc-devcontainer-setup.
tags:
  - positive-trigger
  - archetype-a
  - wizard
inputs:
  prompt: >
    Use skill:sdlc-wizard to set up a devcontainer for this project.
    When prompted, choose to configure a DevContainer for a Node.js stack.
expected:
  should_trigger: true
graders:
  - name: skill-chain
    type: skill_invocation
    config:
      required_skills:
        - sdlc-wizard
        - sdlc-devcontainer-setup
      mode: in_order
      allow_extra: true
  - name: behavior-budget
    type: behavior
    config:
      max_tokens: 300000
      max_duration_ms: 600000
      max_tool_calls: 80
  - name: wizard-output-text
    type: text
    config:
      contains:
        - devcontainer
