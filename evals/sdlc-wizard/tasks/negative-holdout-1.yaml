id: wizard-holdout-negative-merlin
name: Hold-out adversarial negative — Merlin the wizard
description: >
  Hold-out negative. A question about Merlin must NOT trigger sdlc-wizard.
tags:
  - negative-trigger
  - holdout
  - adversarial
inputs:
  prompt: "Describe the role of Merlin as a wizard in Arthurian legend."
expected:
  should_trigger: false
graders:
  - name: no-skill-invoked
    type: behavior
    config:
      forbidden_tools:
        - skill
  - name: no-wizard-json
    type: file
    config:
      must_not_exist:
        - .wizard.json
  - name: no-sdlc-language
    type: text
    config:
      not_contains:
        - devcontainer
        - graphify
        - sdlc capabilities
