# yaml-language-server: $schema=https://raw.githubusercontent.com/microsoft/waza/main/schemas/task.schema.json
name: auto-generated-test
inputs:
  prompt: List the files in the current directory using a shell command.
id: auto-generated-test
graders:
  - name: tools-check
    type: tool_constraint
    config:
      expect_tools:
        - tool: bash
          command_pattern: ls -la --color=never
  - name: check-response
    type: text
    config:
      contains_cs:
        - |-
          Running ls -la to list files in the current directory; it's the quickest way to show filenames and metadata.

          total 8
          drwx------ 2 node node 4096 May 12 02:33 .
          drwxrwxrwt 1 root root 4096 May 12 02:33 ..
