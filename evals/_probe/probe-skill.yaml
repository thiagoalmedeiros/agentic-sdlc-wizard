# yaml-language-server: $schema=https://raw.githubusercontent.com/microsoft/waza/main/schemas/task.schema.json
name: auto-generated-test
inputs:
  prompt: Use the skill:sdlc-impl-strategy to create a plan for adding a /health endpoint.
id: auto-generated-test
graders:
  - name: skills-check
    type: skill_invocation
    config:
      required_skills:
        - sdlc-impl-strategy
        - sdlc-lessons-learned
        - sdlc-lessons-learned
      mode: any_order
  - name: tools-check
    type: tool_constraint
    config:
      expect_tools:
        - tool: skill
          skill_pattern: sdlc-impl-strategy
        - tool: bash
          command_pattern: |
            mkdir -p /tmp/waza-3317782642/plans/health-endpoint && cat > /tmp/waza-3317782642/plans/health-endpoint/plan\.md <<'PLAN'
            # Plan: Add /health endpoint

            ## Section 1 - What We Are Doing

            1\. \*\*Add /health endpoint \(liveness\)\*\* - Implement a lightweight GET /health route that returns HTTP 200 and a small JSON payload describing service status \(e\.g\., status, uptime_seconds, version\)\. This endpoint provides a quick liveness check for load balancers and external monitors\.
            2\. \*\*Add tests \(unit & integration\)\*\* - Add unit tests for the handler logic and integration tests that exercise the route and \(optionally\) dependency probes \(database/cache\)\. Tests should run in CI\.
            3\. \*\*Update docs and CI\*\* - Document the endpoint in README and add/ensure CI runs the health tests; update any deployment manifests guidance \(README or docs folder\)\.
            4\. Lessons are automatically logged to `lessons\.md` after every user correction and every agent mistake discovered during execution — without being asked\.

            ## Section 2 - How We Are Doing It / What Is Out of Scope

            Execution method

            - Implementation checklist \(typical file paths; adjust to repo structure\):
              - Handler: `src/routes/health\.js` or `src/handlers/health\.js` \(create `GET /health`\)\.
              - Router wiring: `src/server\.js` or `src/app\.js` \(mount the new route\)\.
              - Dependency probes \(optional\): `src/health/dependencies\.js` — export async checks for DB, cache, external APIs; used by the handler when enabled via config\.
              - Tests: `test/unit/health\.test\.js`, `test/integration/health\.integration\.test\.js` \(use existing test framework\)\.
              - Docs: `README\.md` \(Add "Health endpoint" section\) and CI config \(e\.g\., `\.github/workflows/ci\.yml`\) to ensure tests run\.

            - Response shape and behavior:
              - 200 OK and JSON \{"status":"ok","uptime_seconds":<number>,"version":"<app-version>"\} when service is healthy\.
              - If dependency checks are enabled and any critical dependency is down, return 503 with \{"status":"unhealthy","details":\{\.\.\.\}\}\.
              - Make dependency checks behind a config flag to avoid slowing the basic liveness check by default\.

            Validation strategy

            - Per-batch Verify commands: \(see questions below — please provide or allow auto-detect\)\.
            - Global Verify commands: \(see questions below\)\.

            Assumptions and dependencies

            - The repo uses a single Node/Express-like HTTP server with entrypoint in `src/` \(adjust paths if the project uses a different language or framework\)\.
            - Tests are run via a standard command \(e\.g\., `npm test`, `pytest`, or `go test`\)\.
            - CI config is editable in the repo and can be updated to run the new tests\.

            Out of scope

            - Replacing or migrating monitoring/observability systems\.
            - Implementing full readiness checks for every dependency in detail \(only basic checks as specified; deep checks are deferred\)\.
            - Changing deployment manifests \(Kubernetes readiness/liveness probe wiring\) beyond documentation guidance\.

            ## Section 3 - Tracking List

            ### Batch 1 - Implement route and unit tests

            \| #      \| Item                                    \| File/Area                                 \| Status \|
            \| ------ \| --------------------------------------- \| ----------------------------------------- \| ------ \|
            \| 1      \| `Add /health handler`                    \| `src/routes/health\.js` \(or equivalent\)    \| ⬜     \|
            \| 2      \| `Wire route into server`                 \| `src/server\.js` / `src/app\.js`            \| ⬜     \|
            \| 3      \| `Unit tests for handler`                 \| `test/unit/health\.test\.js`                \| ⬜     \|
            \| Thomas \| Verify this batch                        \| `skill:sdlc-thomas` \(optional\)            \| ⛾      \|

            \*\*Verify:\*\* <per-batch verify command\(s\)> -> check `GET /health` returns HTTP 200 and expected JSON

            ### Batch 2 - Dependency probes, integration tests, docs & CI

            \| #      \| Item                                    \| File/Area                                 \| Status \|
            \| ------ \| --------------------------------------- \| ----------------------------------------- \| ------ \|
            \| 1      \| `Add optional dependency probes`         \| `src/health/dependencies\.js`              \| ⬜     \|
            \| 2      \| `Integration tests for /health`          \| `test/integration/health\.integration\.js`  \| ⬜     \|
            \| 3      \| `Update README and add usage docs`       \| `README\.md`                               \| ⬜     \|
            \| 4      \| `Ensure CI runs health tests`            \| `\.github/workflows/ci\.yml` \(or CI file\)   \| ⬜     \|
            \| Thomas \| Verify this batch                        \| `skill:sdlc-thomas` \(optional\)            \| ⛾      \|

            \*\*Verify:\*\* <per-batch verify command\(s\)> -> run integration tests and check `GET /health` behavior in CI-emulated environment


            ## Execution Config

            - Per-batch verify command\(s\): \(please answer\) — "What command\(s\) should run after each batch to verify it\?"
            - Global verify command\(s\): \(please answer\) — "What command\(s\) should run globally after all batches complete\?"
            - `thomas`: disabled by default — please indicate if `skill:sdlc-thomas` should be enabled to witness each Verify step\.

            ## Definition of Done

            - Do you have a Definition of Done skill to use as a verification gate\? If so, name it here \(e\.g\., `skill:definition-of-done`\)\. Otherwise provide inline DoD criteria or leave blank\.


            ## Notes / Next steps for the executor

            1\. Confirm the repo language and server entrypoint paths so file targets above can be adjusted\.
            2\. Provide the per-batch and global verify commands \(or allow auto-detect\)\. If auto-detect is desired, reply "auto-detect" and the executor will search package\.json / Taskfile / README for test/run commands\.
            3\. Indicate whether to enable `skill:sdlc-thomas` and whether to use a DoD skill\.

            PLAN
        - tool: sql
        - tool: skill
          skill_pattern: sdlc-lessons-learned
        - tool: skill
          skill_pattern: sdlc-lessons-learned
        - tool: bash
          command_pattern: |-
            cat > /tmp/waza-3317782642/plans/health-endpoint/lessons\.md <<'LESSONS'
            # Lessons Learned

            _Append an entry whenever the user corrects an approach, something fails
            in a non-obvious way, or a pattern worth remembering is discovered\. Read
            this file at the start of every working session\._

            ## Format

            Each lesson follows this structure:

            ### \[YYYY-MM-DD\] — \[Short Title\]
            \*\*Context:\*\* What was happening when this was discovered
            \*\*Mistake:\*\* What went wrong \(or what was nearly missed\)
            \*\*Rule:\*\* The rule to prevent recurrence
            \*\*Applies to:\*\* \[file, area, or task\]

            ---

            _No lessons recorded yet\._

            LESSONS
        - tool: sql
  - name: check-response
    type: text
    config:
      contains_cs:
        - Creating an implementation plan for adding a /health HTTP endpoint across the project; invoking the sdlc-impl-strategy skill to produce the required three-section plan and add tracked todos. Calling the plan skill and reporting intent in parallel now.Creating the plan file and inserting tracking todos into the session DB, then initializing lessons.md via the lessons skill; asking for the verify commands, Thomas preference, and whether a DoD skill should be used. Running the file creation and DB inserts now.Plan created at plans/health-endpoint/plan.md and lessons.md initialized. Three todos added to the session DB. Provide the project's test/run commands or reply 'auto-detect', indicate whether to enable skill:sdlc-thomas, and name a DoD skill if you want one used.
