# yaml-language-server: $schema=https://raw.githubusercontent.com/microsoft/waza/main/schemas/task.schema.json
name: auto-generated-test
inputs:
  prompt: Fetch the content of https://example.com and summarize it.
id: auto-generated-test
graders:
  - name: tools-check
    type: tool_constraint
    config:
      expect_tools:
        - tool: web_fetch
  - name: check-response
    type: text
    config:
      contains_cs:
        - |-
          Summary of https://example.com — concise:

          - The page states that the domain "example.com" is reserved for use in documentation and example code and should not be used in actual operations.
          - It includes a link to IANA for more information: https://iana.org/domains/example.
