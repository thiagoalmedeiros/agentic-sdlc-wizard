name: jira-fetch-eval
description: >-
  Eval suite for jira-fetch. Run with skills loaded (eval:skill) or without
  (eval:baseline) to measure what the skill adds. Score delta = skill value.
skill: jira-fetch
version: "1.0"
config:
  trials_per_task: 3
  timeout_seconds: 300
  parallel: false
  executor: copilot-sdk
  model: claude-haiku-4.5
tasks:
  - "tasks/*.yaml"
