id: wizard-eval-scaffold-eval-suite
name: Scaffold eval suite from SKILL.md
description: >
  Trigger sdlc-wizard-eval to scaffold an eval suite from the sdlc-council
  SKILL.md. Checks that the eval files are created.
tags:
  - positive-trigger
  - archetype-a
  - waza-eval
inputs:
  prompt: >
    Use skill:sdlc-wizard-eval to scaffold a Waza eval suite from the
    .claude/skills/sdlc-council/SKILL.md file in this project.
expected:
  should_trigger: true
graders:
  - name: skill-invoked
    type: skill_invocation
    config:
      required_skills:
        - sdlc-wizard-eval
      mode: any_order
      allow_extra: true
  - name: action-sequence
    type: action_sequence
    config:
      matching_mode: in_order_match
      expected_actions:
        - type: skill_invoked
          skill: sdlc-wizard-eval
        - type: tool_called
          tool: bash
  - name: behavior-budget
    type: behavior
    config:
      max_tokens: 300000
      max_duration_ms: 600000
      max_tool_calls: 80
