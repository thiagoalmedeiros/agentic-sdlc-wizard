id: docs-sync-update-readme
name: Sync README after code changes
description: >
  Trigger docs-sync to detect documentation drift and update README.md.
  Verifies git diff is run and docs are reviewed.
tags:
  - positive-trigger
  - archetype-e
  - doc-file
inputs:
  prompt: >
    Use skill:docs-sync to check if README.md is aligned with the current
    codebase. Run a pre-merge documentation check against origin/main and
    update any sections that are out of date.
expected:
  should_trigger: true
graders:
  - name: bash-used
    type: behavior
    config:
      required_tools:
        - bash
  - name: skill-invoked
    type: skill_invocation
    config:
      required_skills:
        - docs-sync
      mode: any_order
      allow_extra: true
  - name: behavior-budget
    type: behavior
    config:
      max_tokens: 60000
      max_duration_ms: 180000
      max_tool_calls: 15
