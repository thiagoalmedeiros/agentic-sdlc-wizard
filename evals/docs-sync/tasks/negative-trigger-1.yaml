id: docs-sync-negative-google-docs
name: Adversarial negative — Google Docs to Dropbox
description: >
  Adversarial negative. Syncing Google Docs to Dropbox is unrelated to code
  documentation and must NOT trigger docs-sync.
tags:
  - negative-trigger
  - adversarial
inputs:
  prompt: "Sync my Google Docs to Dropbox."
expected:
  should_trigger: false
graders:
  - name: no-skill-invoked
    type: behavior
    config:
      forbidden_tools:
        - skill
  - name: no-git-diff
    type: text
    config:
      not_contains:
        - git diff
        - origin/main
        - AGENTS.md
        - ARCHITECTURE.md
