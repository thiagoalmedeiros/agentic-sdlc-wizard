id: docs-sync-holdout-negative-google-docs
name: Hold-out adversarial negative — Google Docs sync
description: >
  Hold-out negative. A request to sync Google Docs to Notion must NOT trigger
  docs-sync.
tags:
  - negative-trigger
  - holdout
  - adversarial
inputs:
  prompt: "Sync all my Google Docs to Notion automatically."
expected:
  should_trigger: false
graders:
  - name: no-skill-invoked
    type: behavior
    config:
      forbidden_tools:
        - skill
  - name: no-git-diff
    type: text
    config:
      not_contains:
        - git diff
        - README.md
        - AGENTS.md
