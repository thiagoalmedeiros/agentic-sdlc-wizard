name: docs-sync-eval
description: >-
  Eval suite for docs-sync — documentation alignment skill.
  Archetype E: file content_patterns + action_sequence + behavior budgets.
skill: docs-sync
version: "1.0"
config:
  trials_per_task: 1
  timeout_seconds: 300
  parallel: false
  executor: copilot-sdk
  model: gpt-5-mini
metrics:
  - name: task_completion
    weight: 0.7
    threshold: 0.8
    description: Did the skill identify and sync the documentation correctly?
  - name: efficiency
    weight: 0.3
    threshold: 0.7
    description: Did the skill stay within archetype-E behavior limits?
graders:
  - type: behavior
    name: archetype-e-budget
    config:
      max_tokens: 60000
      max_duration_ms: 180000
      max_tool_calls: 15
tasks:
  - "tasks/*.yaml"
