# yaml-language-server: $schema=https://raw.githubusercontent.com/microsoft/waza/main/schemas/trigger_tests.schema.json
skill: docs-sync

should_trigger_prompts:
  - prompt: "Use skill:docs-sync to update AGENTS.md after the changes I just made to the codebase."
    confidence: high
  - prompt: "Run docs-sync to check if ARCHITECTURE.md is still accurate with the current code."
    confidence: high
  - prompt: "Sync the README.md with the latest code changes using the docs-sync skill."
    confidence: high
  - prompt: "Run a pre-merge documentation check using docs-sync."
    confidence: medium
  - prompt: "Update CLAUDE.md to reflect the new agent workflow we just implemented."
    confidence: medium
  - prompt: "Detect doc drift and update all docs to match the main branch."
    confidence: medium

should_not_trigger_prompts:
  - prompt: "Sync my Google Docs to Dropbox."
    confidence: high
  - prompt: "How do I sync files between two servers using rsync?"
    confidence: high
  - prompt: "What are the best practices for writing documentation?"
    confidence: high
  - prompt: "Use skill:jira-fetch to pull the ticket description."
    confidence: medium
  - prompt: "Run skill:sdlc-impl-strategy to plan the new feature."
    confidence: medium
  - prompt: "Use skill:sdlc-lessons-learned to log what we learned today."
    confidence: medium
