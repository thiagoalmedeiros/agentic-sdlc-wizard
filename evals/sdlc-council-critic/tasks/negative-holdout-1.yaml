id: critic-holdout-negative-film-review
name: Hold-out adversarial negative — film critic review
description: >
  Hold-out negative. A request to write a film critic review must NOT trigger
  sdlc-council-critic.
tags:
  - negative-trigger
  - holdout
  - adversarial
inputs:
  prompt: "Write a film critic review of The Dark Knight in the style of Roger Ebert."
expected:
  should_trigger: false
graders:
  - name: no-skill-invoked
    type: behavior
    config:
      forbidden_tools:
        - skill
  - name: no-code-created
    type: behavior
    config:
      forbidden_tools:
        - create
  - name: no-sdlc-language
    type: text
    config:
      not_contains:
        - hidden assumption
        - alternative approach
        - blind spot
