# yaml-language-server: $schema=https://raw.githubusercontent.com/microsoft/waza/main/schemas/trigger_tests.schema.json
skill: sdlc-council-critic

should_trigger_prompts:
  - prompt: "Use skill:sdlc-council-critic to challenge this proposal: we should rewrite the backend in Rust."
    confidence: high
  - prompt: "Run sdlc-council-critic and tell me the blind spots in this architecture decision."
    confidence: high
  - prompt: "Use skill:sdlc-council-critic to pressure-test our plan to merge all microservices into a monolith."
    confidence: high
  - prompt: "Have the critic review the assumptions behind our new caching strategy."
    confidence: medium
  - prompt: "Use skill:sdlc-council-critic to find alternative angles on our database sharding approach."
    confidence: medium
  - prompt: "Use skill:sdlc-council-critic to challenge this consensus — everyone agreed on Kubernetes but I'm not sure."
    confidence: medium

should_not_trigger_prompts:
  - prompt: "Write a movie critic's review of Blade Runner 2049."
    confidence: high
  - prompt: "Who are some famous film critics and what makes a good review?"
    confidence: high
  - prompt: "My code works fine — no need to review anything."
    confidence: high
  - prompt: "Use skill:sdlc-council-sherlock to debug a failing test."
    confidence: medium
  - prompt: "Run skill:sdlc-thomas to verify that feature X is complete."
    confidence: medium
  - prompt: "Use skill:sdlc-council-daedalus to break down the architecture for a login service."
    confidence: medium
