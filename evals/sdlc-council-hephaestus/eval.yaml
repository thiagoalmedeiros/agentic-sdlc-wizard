name: sdlc-council-hephaestus-eval
description: >-
  Eval suite for sdlc-council-hephaestus — implementation skill.
  Archetype B: file graders + skill_invocation + behavior budgets.
skill: sdlc-council-hephaestus
version: "1.0"
config:
  trials_per_task: 1
  timeout_seconds: 600
  parallel: false
  executor: copilot-sdk
  model: gpt-5-mini
metrics:
  - name: task_completion
    weight: 0.7
    threshold: 0.8
    description: Did the skill produce the required code files?
  - name: efficiency
    weight: 0.3
    threshold: 0.7
    description: Did the skill stay within archetype-B behavior limits?
graders:
  - type: behavior
    name: archetype-b-budget
    config:
      max_tokens: 200000
      max_duration_ms: 300000
      max_tool_calls: 40
tasks:
  - "tasks/*.yaml"
