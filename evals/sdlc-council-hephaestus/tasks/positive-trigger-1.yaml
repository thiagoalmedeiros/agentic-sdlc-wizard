id: hephaestus-implement-health-route
name: Implement /health endpoint
description: >
  Trigger sdlc-council-hephaestus to implement a /health endpoint. Verifies
  that the code file is created with correct content using file graders.
tags:
  - positive-trigger
  - archetype-b
  - implementation
inputs:
  prompt: >
    Use skill:sdlc-council-hephaestus to implement a GET /health endpoint.
    Create the handler in src/routes/health.js that returns
    {"status":"ok"} with HTTP 200. Then wire it in src/cli.js.
    Read the existing code first, then create/modify only the required files.
expected:
  should_trigger: true
graders:
  - name: health-file-created
    type: file
    config:
      must_exist:
        - src/routes/health.js
      content_patterns:
        - path: src/routes/health.js
          must_match:
            - "(?i)status"
            - "(?i)200|ok"
  - name: skill-invoked
    type: skill_invocation
    config:
      required_skills:
        - sdlc-council-hephaestus
      mode: any_order
      allow_extra: true
  - name: behavior-budget
    type: behavior
    config:
      max_tokens: 200000
      max_duration_ms: 300000
      max_tool_calls: 40
