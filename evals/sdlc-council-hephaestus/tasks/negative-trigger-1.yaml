id: hephaestus-negative-greek-forge
name: Adversarial negative — Greek forge mythology
description: >
  Adversarial negative. A question about Greek mythology must NOT trigger
  sdlc-council-hephaestus. Verifies the skill declines non-implementation requests.
tags:
  - negative-trigger
  - adversarial
inputs:
  prompt: "What metals did Hephaestus forge in Greek mythology?"
expected:
  should_trigger: false
graders:
  - name: no-skill-invoked
    type: behavior
    config:
      forbidden_tools:
        - skill
  - name: no-code-created
    type: file
    config:
      must_not_exist:
        - src/routes/health.js
  - name: no-sdlc-language
    type: text
    config:
      not_contains:
        - implementation plan
        - batch
        - tracking list
