id: hephaestus-holdout-negative-blacksmith
name: Hold-out adversarial negative — Hephaestus the blacksmith
description: >
  Hold-out negative. A question about the god Hephaestus must NOT trigger
  sdlc-council-hephaestus.
tags:
  - negative-trigger
  - holdout
  - adversarial
inputs:
  prompt: "What items did Hephaestus forge for the other Greek gods according to mythology?"
expected:
  should_trigger: false
graders:
  - name: no-skill-invoked
    type: behavior
    config:
      forbidden_tools:
        - skill
  - name: no-code-created
    type: behavior
    config:
      forbidden_tools:
        - create
  - name: no-code-language
    type: text
    config:
      not_contains:
        - implement
        - test suite
        - write code
