name: sdlc-council-sherlock-eval
description: >-
  Eval suite for sdlc-council-sherlock — autonomous debugging and repair skill.
  Archetype C: behavior (bash+view) + prompt grader + text(regex) + forbidden_tools.
skill: sdlc-council-sherlock
version: "1.0"
config:
  trials_per_task: 1
  timeout_seconds: 300
  parallel: false
  executor: copilot-sdk
  model: gpt-5-mini
metrics:
  - name: task_completion
    weight: 0.7
    threshold: 0.8
    description: Did sherlock investigate and attempt to repair the defect?
  - name: efficiency
    weight: 0.3
    threshold: 0.7
    description: Did the skill stay within archetype-C behavior limits?
graders:
  - type: behavior
    name: archetype-c-budget
    config:
      max_tokens: 60000
      max_duration_ms: 180000
      max_tool_calls: 15
tasks:
  - "tasks/*.yaml"
