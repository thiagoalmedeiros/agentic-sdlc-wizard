id: sherlock-debug-install-test
name: Debug failing install test
description: >
  Trigger sdlc-council-sherlock to diagnose and fix a failing test in
  test/install.test.js. Verifies sherlock runs tests and reads source.
tags:
  - positive-trigger
  - archetype-c
  - debugging
inputs:
  prompt: >
    Use skill:sdlc-council-sherlock to diagnose and fix the failing unit test
    in test/install.test.js. Run the tests, find the root cause, and apply
    a fix. Record your findings.
expected:
  should_trigger: true
graders:
  - name: skill-invoked
    type: skill_invocation
    config:
      required_skills:
        - sdlc-council-sherlock
      mode: any_order
      allow_extra: true
  - name: runs-tests
    type: behavior
    config:
      required_tools:
        - bash
  - name: diagnostic-output
    type: text
    config:
      contains_any:
        - root cause
        - diagnos
        - failing
        - fix
  - name: behavior-budget
    type: behavior
    config:
      max_tokens: 60000
      max_duration_ms: 180000
      max_tool_calls: 15
