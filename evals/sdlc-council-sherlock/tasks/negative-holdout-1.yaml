id: sherlock-holdout-negative-detective-fiction
name: Hold-out adversarial negative — detective fiction recommendation
description: >
  Hold-out negative. A request for detective fiction recommendations must NOT
  trigger sdlc-council-sherlock.
tags:
  - negative-trigger
  - holdout
  - adversarial
inputs:
  prompt: "Recommend three detective fiction novels for someone who loves Agatha Christie."
expected:
  should_trigger: false
graders:
  - name: no-skill-invoked
    type: behavior
    config:
      forbidden_tools:
        - skill
  - name: no-debug-run
    type: behavior
    config:
      forbidden_tools:
        - bash
  - name: no-debug-language
    type: text
    config:
      not_contains:
        - root cause
        - stack trace
        - reproduce
