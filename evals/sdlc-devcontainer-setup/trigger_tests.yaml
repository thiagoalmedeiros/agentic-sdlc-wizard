# yaml-language-server: $schema=https://raw.githubusercontent.com/microsoft/waza/main/schemas/trigger_tests.schema.json
skill: sdlc-devcontainer-setup

should_trigger_prompts:
  - prompt: "Use skill:sdlc-devcontainer-setup to configure a dev container for this Node.js project."
    confidence: high
  - prompt: "Set up a .devcontainer with Docker Compose and a Dockerfile for our Python API."
    confidence: high
  - prompt: "Create a devcontainer.json and docker-compose.yml for this workspace."
    confidence: high
  - prompt: "Configure a reproducible development environment using dev containers."
    confidence: medium
  - prompt: "I need a devcontainer setup with PostgreSQL and Redis services for this project."
    confidence: medium
  - prompt: "Review and improve the existing .devcontainer configuration for this repo."
    confidence: medium

