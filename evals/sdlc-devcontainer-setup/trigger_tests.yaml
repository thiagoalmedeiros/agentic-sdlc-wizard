    confidence: high
  - prompt: "What's the difference between Docker containers and virtual machines?"
    confidence: high
  - prompt: "How do I deploy a container to AWS ECS?"
    confidence: high
  - prompt: "Use skill:sdlc-graphify-setup to install the knowledge graph for this repo."
    confidence: medium
  - prompt: "Use skill:sdlc-wizard to set up the project from scratch."
    confidence: medium
  - prompt: "Run skill:sdlc-impl-strategy to plan adding Docker support."
    confidence: medium
