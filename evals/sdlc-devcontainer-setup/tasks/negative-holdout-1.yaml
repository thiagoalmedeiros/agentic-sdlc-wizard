id: devcontainer-holdout-negative-flower-container
name: Hold-out adversarial negative — flower container
description: >
  Hold-out negative. A question about flower containers must NOT trigger
  sdlc-devcontainer-setup.
tags:
  - negative-trigger
  - holdout
  - adversarial
inputs:
  prompt: "What kind of containers are best for growing tomatoes on a balcony?"
expected:
  should_trigger: false
graders:
  - name: no-skill-invoked
    type: behavior
    config:
      forbidden_tools:
        - skill
  - name: no-devcontainer-files
    type: file
    config:
      must_not_exist:
        - .devcontainer/devcontainer.json
  - name: no-docker-language
    type: text
    config:
      not_contains:
        - devcontainer.json
        - docker-compose
        - Dockerfile
