id: strategy-debate-negative-highschool
name: Adversarial negative — high-school debate team
description: >
  Adversarial negative. A request to prepare for a high-school debate team
  must NOT trigger sdlc-strategy-debate.
tags:
  - negative-trigger
  - adversarial
inputs:
  prompt: "Help me prepare for a high-school debate team on AI ethics."
expected:
  should_trigger: false
graders:
  - name: no-skill-invoked
    type: behavior
    config:
      forbidden_tools:
        - skill
  - name: no-debate-file
    type: file
    config:
      must_not_exist:
        - plans/ai-ethics/debate.md
  - name: no-sdlc-language
    type: text
    config:
      not_contains:
        - daedalus
        - hephaestus
        - implementation plan
