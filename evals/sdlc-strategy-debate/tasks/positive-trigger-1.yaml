id: strategy-debate-microservices
name: Debate microservices vs monolith
description: >
  Trigger sdlc-strategy-debate to debate whether to migrate to microservices.
  Verifies that debate.md is created with required multi-perspective sections.
tags:
  - positive-trigger
  - archetype-a
  - debate
inputs:
  prompt: >
    Use skill:sdlc-strategy-debate to debate the proposal: migrate this
    Node.js project from a monolith to microservices. Topic: microservices-migration.
    Produce the debate.md but stop before the implementation plan.
expected:
  should_trigger: true
graders:
  - name: debate-file-exists
    type: file
    config:
      must_exist:
        - plans/microservices-migration/debate.md
      content_patterns:
        - path: plans/microservices-migration/debate.md
          must_match:
            - "(?i)daedalus"
            - "(?i)hephaestus"
            - "(?i)critic"
  - name: skill-invoked
    type: skill_invocation
    config:
      required_skills:
        - sdlc-strategy-debate
      mode: any_order
      allow_extra: true
  - name: behavior-budget
    type: behavior
    config:
      max_tokens: 300000
      max_duration_ms: 600000
      max_tool_calls: 80
