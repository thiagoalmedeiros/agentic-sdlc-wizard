name: sdlc-thomas-eval
description: >-
  Eval suite for sdlc-thomas — hands-on validation skill.
  Archetype C: behavior (bash) + prompt grader + text(regex) + forbidden_tools.
skill: sdlc-thomas
version: "1.0"
config:
  trials_per_task: 1
  timeout_seconds: 300
  parallel: false
  executor: copilot-sdk
  model: gpt-5-mini
metrics:
  - name: task_completion
    weight: 0.7
    threshold: 0.8
    description: Did thomas actually execute verification steps and report observed results?
  - name: efficiency
    weight: 0.3
    threshold: 0.7
    description: Did the skill stay within archetype-C behavior limits?
graders:
  - type: behavior
    name: archetype-c-budget
    config:
      max_tokens: 60000
      max_duration_ms: 180000
      max_tool_calls: 15
tasks:
  - "tasks/*.yaml"
