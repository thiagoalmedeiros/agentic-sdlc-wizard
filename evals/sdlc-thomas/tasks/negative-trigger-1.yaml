id: thomas-negative-aquinas
name: Adversarial negative — Thomas Aquinas
description: >
  Adversarial negative. A question about Thomas Aquinas must NOT trigger
  sdlc-thomas.
tags:
  - negative-trigger
  - adversarial
inputs:
  prompt: "Who was Thomas Aquinas and what were his main philosophical contributions?"
expected:
  should_trigger: false
graders:
  - name: no-skill-invoked
    type: behavior
    config:
      forbidden_tools:
        - skill
  - name: no-validation-run
    type: behavior
    config:
      forbidden_tools:
        - bash
  - name: no-validation-language
    type: text
    config:
      not_contains:
        - test result
        - validate
        - production-ready
