id: thomas-holdout-negative-doubting-thomas
name: Hold-out adversarial negative — Doubting Thomas biblical reference
description: >
  Hold-out negative. A question about the biblical figure Doubting Thomas must
  NOT trigger sdlc-thomas.
tags:
  - negative-trigger
  - holdout
  - adversarial
inputs:
  prompt: "What is the story of Doubting Thomas in the Bible and what does it represent?"
expected:
  should_trigger: false
graders:
  - name: no-skill-invoked
    type: behavior
    config:
      forbidden_tools:
        - skill
  - name: no-validation-run
    type: behavior
    config:
      forbidden_tools:
        - bash
  - name: no-validation-language
    type: text
    config:
      not_contains:
        - passing output
        - production-ready
        - test result
