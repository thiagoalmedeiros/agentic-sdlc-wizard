id: thomas-validate-feature-readiness
name: Validate feature is production-ready
description: >
  Trigger sdlc-thomas to validate a claim that a feature is ready. Verifies
  thomas runs tests and reads source rather than accepting assumptions.
tags:
  - positive-trigger
  - archetype-c
  - validation
inputs:
  prompt: >
    The team says the config module in src/config.js is production-ready.
    Use skill:sdlc-thomas to verify this claim. Run all relevant tests,
    read the code, and report only what you observed firsthand.
expected:
  should_trigger: true
graders:
  - name: skill-invoked
    type: skill_invocation
    config:
      required_skills:
        - sdlc-thomas
      mode: any_order
      allow_extra: true
  - name: reads-code
    type: behavior
    config:
      required_tools:
        - view
  - name: prompt-quality
    type: prompt
    config:
      prompt: >
        The agent was asked to validate a claim that a feature is production-ready
        using sdlc-thomas. Did the agent: (1) refuse to assume the claim is true,
        (2) actually run or read tests/code itself, and (3) report the actual
        observed result rather than a probability? Score 1 if all three, 0 otherwise.
      threshold: 0.7
  - name: behavior-budget
    type: behavior
    config:
      max_tokens: 60000
      max_duration_ms: 180000
      max_tool_calls: 15
