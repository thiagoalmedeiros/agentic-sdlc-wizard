id: thomas-validate-install-command
name: Validate install command works correctly
description: >
  Trigger sdlc-thomas to validate that the install command works.
  Verifies thomas actually runs checks instead of assuming.
tags:
  - positive-trigger
  - archetype-c
  - validation
inputs:
  prompt: >
    Use skill:sdlc-thomas to validate that the install command in this project
    works correctly. Run the tests, execute the command, and report exactly
    what you observed. Do not assume anything passes without running it.
expected:
  should_trigger: true
graders:
  - name: skill-invoked
    type: skill_invocation
    config:
      required_skills:
        - sdlc-thomas
      mode: any_order
      allow_extra: true
  - name: runs-checks
    type: behavior
    config:
      required_tools:
        - bash
  - name: observed-output
    type: text
    config:
      contains_any:
        - observed
        - passed
        - failed
        - verified
        - output
  - name: behavior-budget
    type: behavior
    config:
      max_tokens: 60000
      max_duration_ms: 180000
      max_tool_calls: 15
