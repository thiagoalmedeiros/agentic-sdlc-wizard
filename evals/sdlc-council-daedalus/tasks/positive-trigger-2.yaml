id: daedalus-decompose-notification-service
name: Decompose notification service
description: >
  Trigger sdlc-council-daedalus to break down a notification service into
  dependency-ordered batches. Checks action sequence: codebase exploration
  precedes plan file creation.
tags:
  - positive-trigger
  - archetype-b
  - architecture
inputs:
  prompt: >
    Use skill:sdlc-council-daedalus to produce an architecture specification
    and actionable implementation plan for a notification service in this
    project. Plan folder: plans/notification-service. Include file paths and
    dependency-ordered batches.
expected:
  should_trigger: true
graders:
  - name: plan-file-exists
    type: file
    config:
      must_exist:
        - plans/notification-service/plan.md
        - plans/notification-service/lessons.md
      content_patterns:
        - path: plans/notification-service/plan.md
          must_match:
            - "(?m)^### Section 3 - Tracking List"
            - "(?m)\\|\\s+#\\s+\\|\\s+Item"
  - name: action-sequence
    type: action_sequence
    config:
      matching_mode: in_order_match
      expected_actions:
        - type: skill_invoked
          skill: sdlc-council-daedalus
        - type: file_created
          path_pattern: "plans/notification-service/plan\.md"
  - name: behavior-budget
    type: behavior
    config:
      max_tokens: 200000
      max_duration_ms: 300000
      max_tool_calls: 40
