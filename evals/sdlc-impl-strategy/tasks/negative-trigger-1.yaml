id: impl-strategy-negative-kyoto-trip
name: Adversarial negative — weekend trip planning
description: >
  Adversarial negative. A personal travel planning request must NOT trigger
  sdlc-impl-strategy. Verifies the skill correctly declines off-topic requests.
tags:
  - negative-trigger
  - adversarial
inputs:
  prompt: "Plan my weekend trip to Kyoto. I want to see the temples and eat sushi."
expected:
  should_trigger: false
graders:
  - name: no-skill-invoked
    type: behavior
    config:
      forbidden_tools:
        - skill
  - name: no-plan-file
    type: file
    config:
      must_not_exist:
        - plans/kyoto-trip/plan.md
  - name: no-sdlc-language
    type: text
    config:
      not_contains:
        - tracking list
        - implementation plan
        - what we are doing
        - sdlc-impl-strategy
