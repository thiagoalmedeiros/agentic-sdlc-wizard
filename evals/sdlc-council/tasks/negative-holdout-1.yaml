id: council-holdout-negative-un-security
name: Hold-out adversarial negative — UN Security Council
description: >
  Hold-out negative. A question about the UN Security Council must NOT trigger
  sdlc-council.
tags:
  - negative-trigger
  - holdout
  - adversarial
inputs:
  prompt: "What is the history of the United Nations Security Council and how are permanent members chosen?"
expected:
  should_trigger: false
graders:
  - name: no-skill-invoked
    type: behavior
    config:
      forbidden_tools:
        - skill
  - name: no-sdlc-language
    type: text
    config:
      not_contains:
        - tracking list
        - implementation plan
        - sdlc workflow
