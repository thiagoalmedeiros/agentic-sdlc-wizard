id: council-orchestrate-auth-feature
name: Orchestrate user authentication feature
description: >
  Trigger sdlc-council to orchestrate the full workflow for a user
  authentication feature. Checks first-hop skill invocation and that a
  plan is produced with correct structure.
tags:
  - positive-trigger
  - archetype-a
  - orchestrator
inputs:
  prompt: >
    Use skill:sdlc-council to plan and begin implementing user authentication
    for this Node.js project. Topic: auth-feature. Stop after the plan
    is produced — do not execute implementation batches.
expected:
  should_trigger: true
graders:
  - name: skill-invoked
    type: skill_invocation
    config:
      required_skills:
        - sdlc-council
      mode: any_order
      allow_extra: true
  - name: plan-produced
    type: file
    config:
      must_exist:
        - plans/auth-feature/plan.md
      content_patterns:
        - path: plans/auth-feature/plan.md
          must_match:
            - "(?m)^### Section 1 - What We Are Doing"
            - "(?m)^### Section 3 - Tracking List"
  - name: behavior-budget
    type: behavior
    config:
      max_tokens: 300000
      max_duration_ms: 600000
      max_tool_calls: 80
