name: Run Skill Evaluations

on:
  workflow_dispatch:

permissions:
  contents: read

jobs:
  eval:
    name: Run Evaluations
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Install Waza
        run: curl -fsSL https://raw.githubusercontent.com/microsoft/waza/main/install.sh | bash

      - name: Authenticate GitHub Copilot CLI
        run: gh auth status
        env:
          GH_TOKEN: ${{ secrets.COPILOT_TOKEN }}

      - name: Verify Copilot access
        run: gh api user --jq '.login'
        env:
          GH_TOKEN: ${{ secrets.COPILOT_TOKEN }}

      - name: Run evaluations
        run: |
          FAILED=0
          for f in evals/*/eval.yaml; do
            echo "▶ Running: $f"
            if ! waza run "$f" -v -o "${f%/eval.yaml}/results.json"; then
              echo "❌ FAILED: $f"
              FAILED=$((FAILED + 1))
            else
              echo "✅ PASSED: $f"
            fi
          done
          echo "--- Summary: $FAILED skill(s) failed ---"
          exit $FAILED
        env:
          GITHUB_TOKEN: ${{ secrets.COPILOT_TOKEN }}

      - name: Upload results
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: eval-results
          path: evals/**/results.json
          retention-days: 30
